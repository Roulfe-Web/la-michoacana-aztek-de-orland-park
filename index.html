<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-500.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://lamichoacanaaztek.com/" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Michoacana Aztek de Orland Park</title>

    <meta name="description" content="La Michoacana Aztek in Orland Park serves authentic Mexican ice cream, paletas, mangonadas, elotes, aguas frescas, snacks, and refreshing treats made for the whole family." />
    <meta property="og:title" content="La Michoacana Aztek | Mexican Ice Cream in Orland Park" />
    <meta
      property="og:description"
      content="Visit La Michoacana Aztek in Orland Park for Mexican ice cream, paletas, mangonadas, elotes, aguas frescas, snacks, and more."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lamichoacanaaztek.com/" />

    <link
      rel="preload"
      as="image"
      href="/assets/mangonada-desktop-800w.webp"
      imagesrcset="/assets/mangonada-mobile-500w.webp 500w, /assets/mangonada-desktop-800w.webp 800w"
      imagesizes="(max-width: 767px) 420px, 700px"
    />
  </head>
  <body>

    <form
      name="contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <form
      name="job-application"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      enctype="multipart/form-data"
      hidden
    >
      <input type="hidden" name="form-name" value="job-application" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input type="file" name="completed-application" />
      <input type="file" name="resume" />
      <input name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
